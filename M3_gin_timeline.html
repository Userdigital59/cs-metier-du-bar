<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Gin — Frise historique par siècle | CS Métiers du Bar</title>
<style>
:root{
  --noir:#14110F;
  --or:#C9A227;
  --or-clair:#E3C766;
  --blanc:#FFFFFF;
  --rouge-err:#8B2E2E;
  --vert-ok:#3E6B4F;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
html,body{height:100%}
body{
  background:var(--noir);
  color:var(--blanc);
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 15% 10%, rgba(201,162,39,0.10), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(201,162,39,0.08), transparent 45%),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 4px);
  pointer-events:none;
  z-index:0;
}

.deco{position:absolute;opacity:0.20;z-index:0;pointer-events:none;filter:drop-shadow(0 0 8px rgba(201,162,39,0.25))}
.deco-homme{width:54px;right:14px;top:12px}
.deco-femme{width:48px;right:62px;top:16px}
@media (max-width:820px){.deco{display:none}}

.stage{
  position:relative;
  z-index:1;
  max-width:1080px;
  height:100vh;
  height:100svh;
  height:100dvh;
  margin:0 auto;
  padding:16px 20px 12px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== HEADER ===== */
header{
  text-align:center;
  padding:14px 20px 14px;
  border:1px solid rgba(201,162,39,0.35);
  border-radius:14px;
  background:linear-gradient(180deg, rgba(201,162,39,0.07), transparent 70%);
  position:relative;
  flex:0 0 auto;
  overflow:hidden;
}
.header-inner{display:flex;align-items:center;justify-content:center;gap:16px}
.logo-header{width:56px;height:56px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(201,162,39,0.4))}
.head-text{text-align:left}
.kicker{
  display:inline-block;
  letter-spacing:3px;
  font-size:10.5px;
  text-transform:uppercase;
  color:var(--or-clair);
  border:1px solid rgba(201,162,39,0.45);
  border-radius:999px;
  padding:4px 12px;
  margin-bottom:6px;
}
h1{
  font-size:clamp(20px,3.2vw,30px);
  letter-spacing:.5px;
  line-height:1.1;
}
h1 span{color:var(--or)}
.subtitle{
  margin-top:3px;
  color:rgba(255,255,255,0.6);
  font-size:12.5px;
}

/* ===== NAV SIÈCLES ===== */
.nav-siecles{
  flex:0 0 auto;
  display:flex;
  gap:8px;
  margin:14px 0;
  overflow-x:auto;
  padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
}
.tab{
  flex:1 1 0;
  min-width:88px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(201,162,39,0.3);
  border-radius:10px;
  padding:10px 6px;
  text-align:center;
  cursor:pointer;
  transition:all .25s ease;
  position:relative;
}
.tab .t-siecle{font-size:14px;font-weight:bold;color:var(--or-clair);letter-spacing:.5px}
.tab .t-periode{display:block;font-size:9.5px;color:rgba(255,255,255,0.5);margin-top:2px}
.tab:hover{border-color:var(--or);transform:translateY(-2px)}
.tab.active{background:var(--or);border-color:var(--or)}
.tab.active .t-siecle{color:var(--noir)}
.tab.active .t-periode{color:rgba(20,17,15,0.65)}
.tab.done::after{
  content:"✓";
  position:absolute;top:4px;right:6px;
  font-size:10px;color:var(--vert-ok);
}
.tab.active.done::after{color:var(--noir)}

/* ===== PROGRESSION ===== */
.progress-wrap{
  flex:0 0 auto;
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.progress-label{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--or-clair);white-space:nowrap}
.progress-bar{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--or),var(--or-clair));border-radius:99px;transition:width .5s ease}
.progress-count{font-size:11.5px;color:var(--blanc);min-width:30px;text-align:right}

/* ===== PANNEAU CONTENU ===== */
.panel-wrap{
  flex:1 1 auto;
  min-height:0;
  border:1px solid rgba(201,162,39,0.35);
  border-radius:14px;
  background:rgba(255,255,255,0.02);
  overflow:hidden;
  position:relative;
}
.panel{
  display:none;
  height:100%;
  overflow-y:auto;
  padding:18px 22px 20px;
}
.panel.active{display:block;animation:fadein .35s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.panel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.panel-siecle{font-size:26px;font-weight:bold;color:var(--or)}
.panel-titre{font-size:14.5px;color:rgba(255,255,255,0.75)}

.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(201,162,39,0.28);
  border-radius:10px;
  padding:13px 16px;
  margin-bottom:10px;
  cursor:pointer;
  transition:border-color .25s, transform .2s;
}
.card:hover{border-color:var(--or);transform:translateX(3px)}
.card-head{display:flex;align-items:center;gap:10px}
.card-date{font-size:12.5px;font-weight:bold;color:var(--or-clair);min-width:64px}
.card h3{font-size:14px;color:var(--blanc);flex:1;line-height:1.3}
.card-arrow{font-size:11px;color:var(--or-clair);transition:transform .3s}
.card.open .card-arrow{transform:rotate(90deg)}
.card-details{max-height:0;overflow:hidden;transition:max-height .5s ease, margin .3s ease}
.card.open .card-details{max-height:300px;margin-top:10px}
.card-details p{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.85);border-top:1px solid rgba(201,162,39,0.22);padding-top:9px}
.card-details .anecdote{margin-top:8px;padding:8px 12px;border-left:3px solid var(--or);background:rgba(201,162,39,0.07);font-size:12px;border-radius:0 6px 6px 0;color:var(--or-clair)}

.marques-row{margin-top:14px;padding-top:12px;border-top:1px dashed rgba(201,162,39,0.3)}
.marques-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--or-clair);margin-bottom:6px}
.marques-tags{display:flex;flex-wrap:wrap;gap:6px}
.marques-tags span{font-size:11.5px;background:rgba(201,162,39,0.1);border:1px solid rgba(201,162,39,0.3);border-radius:999px;padding:3px 10px;color:var(--blanc)}

/* ===== FOOTER NAV ===== */
.foot-nav{
  flex:0 0 auto;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;
  gap:10px;
}
.btn{
  background:var(--or);color:var(--noir);border:none;
  font-weight:bold;font-size:12.5px;letter-spacing:.5px;
  padding:9px 18px;border-radius:8px;cursor:pointer;
  transition:transform .2s, box-shadow .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(201,162,39,0.35)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:transparent;color:var(--or-clair);border:1px solid rgba(201,162,39,0.45)}
.footer-credit{font-size:10px;color:rgba(255,255,255,0.35);text-align:center;flex:1}

footer.module-footer{
  flex:0 0 auto;
  text-align:center;
  font-size:10.5px;
  color:rgba(255,255,255,0.35);
  padding-top:8px;
}

/* ===== RESPONSIVE ===== */

/* Tablette */
@media (max-width:900px){
  .stage{padding:14px 16px 10px}
  .logo-header{width:48px;height:48px}
  .tab{min-width:78px}
}

/* Mobile (téléphone standard) */
@media (max-width:640px){
  .stage{padding:10px 12px 8px}
  .header-inner{gap:8px}
  .logo-header{width:38px;height:38px}
  .kicker{font-size:9px;padding:3px 9px;letter-spacing:2px}
  h1{font-size:clamp(17px,5vw,22px)}
  .subtitle{font-size:11px}
  .nav-siecles{gap:6px;margin:10px 0}
  .tab{min-width:64px;padding:7px 4px}
  .tab .t-siecle{font-size:11px}
  .tab .t-periode{font-size:8.5px}
  .progress-wrap{gap:6px;margin-bottom:8px}
  .progress-label{font-size:9px;letter-spacing:1px}
  .panel{padding:14px 14px 16px}
  .panel-siecle{font-size:20px}
  .panel-titre{font-size:12.5px}
  .card{padding:11px 13px}
  .card-head{flex-wrap:wrap}
  .card-date{min-width:auto;font-size:11px}
  .card h3{font-size:13px}
  .foot-nav{gap:6px}
  .btn{padding:8px 12px;font-size:11px}
  .footer-credit{display:none}
  footer.module-footer{font-size:9px}
}

/* Très petit écran */
@media (max-width:380px){
  h1{font-size:16px}
  .tab{min-width:56px}
  .tab .t-periode{display:none}
  .panel-siecle{font-size:18px}
}

/* Écran bas (mobile en paysage) */
@media (max-height:480px){
  header{padding:8px 14px 8px}
  .subtitle{display:none}
  .kicker{margin-bottom:2px}
  .nav-siecles{margin:8px 0}
  .tab{padding:5px 4px}
  .progress-wrap{margin-bottom:6px}
  .panel{padding:10px 16px 12px}
  footer.module-footer{display:none}
}
</style>
</head>

<script>
const DATA = [{"siecle": "XV<sup>e</sup>", "periode": "Italie", "panelTitre": "Les origines médicinales du genièvre", "events": [{"date": "XV<sup>e</sup> s.", "titre": "Le genièvre, plante médicinale en Italie", "texte": "La production de gin trouverait ses origines en Italie au XV<sup>e</sup> siècle, où le genièvre était utilisé comme plante médicinale. Un certain Docteur Sylvius mélange de l'alcool neutre (de seigle) avec des baies de genièvre à des fins médicinales.", "anecdote": "🌿 Avant d'être un spiritueux, le gin est né comme remède : digestion, goutte, calculs biliaires."}]}, {"siecle": "XVI<sup>e</sup>", "periode": "Pays-Bas", "panelTitre": "Naissance du genever hollandais", "events": [{"date": "XVI<sup>e</sup>-XVII<sup>e</sup> s.", "titre": "Diffusion dans les pharmacies hollandaises", "texte": "Cette utilisation médicinale se développe aux Pays-Bas (Hollande), où la version alcoolisée du genièvre était vendue dans les pharmacies pour traiter les problèmes de digestion, de goutte et de calcul biliaire.", "anecdote": ""}, {"date": "1550 / 1575-1664", "titre": "Première eau-de-vie de genièvre & fabrication commerciale", "texte": "La première eau-de-vie de genièvre connue daterait de 1550, mais sa fabrication commerciale commence véritablement en 1575 ou 1664 selon les sources ; elle serait le fait de la Maison Bols à Schiedam (Hollande), qui commercialisait un genever, eau-de-vie de grain simple et rude aux baies de genièvre et épices.", "anecdote": "🚢 Cette eau-de-vie voyage avec les marchands néerlandais — alors les premiers d'Europe — et se fait connaître dans toute l'Europe."}, {"date": "Fin XVI<sup>e</sup> s.", "titre": "Export vers l'Angleterre sous le nom « genever »", "texte": "Le gin serait donc né en Hollande au XVI<sup>e</sup> siècle et commercialisé sous le nom de SCHIEDAM ou de HOLLAND GIN. Vers la fin du XVI<sup>e</sup> siècle, les Hollandais exportent vers l'Angleterre des eaux-de-vie de genièvre appelées « genever ».", "anecdote": ""}], "marques": ["Maison Bols (Schiedam)"]}, {"siecle": "XVII<sup>e</sup>", "periode": "Angleterre", "panelTitre": "Le gin s'implante en Grande-Bretagne — le « Gin Craze »", "events": [{"date": "1688", "titre": "Guillaume d'Orange interdit les importations d'eaux-de-vie", "texte": "Le gin commence à se consommer réellement en Grande-Bretagne au XVII<sup>e</sup> siècle. En 1688, Guillaume d'Orange, roi d'Angleterre, et le parlement anglais interdisent les importations d'eaux-de-vie afin de favoriser la production anglaise faite à partir de grains, permettant à chaque citoyen de produire son propre gin.", "anecdote": ""}, {"date": "Fin XVII<sup>e</sup> s.", "titre": "Le « Gin Craze »", "texte": "Des distilleries nouvelles apparaissent et produisent un alcool similaire au « genever », baptisé « gin ». Les taxes sur l'alcool sont réduites. Ces gins produits « artisanalement » et en grande quantité — on parle alors de « Gin Craze » — sont souvent très nocifs pour la santé et provoquent des ravages au sein de la population.", "anecdote": "⚠️ Le Gin Craze pousse le parlement anglais à imposer des mesures restrictives sur la production individuelle et les méthodes de distillation."}]}, {"siecle": "XVIII<sup>e</sup>", "periode": "Régulation", "panelTitre": "De la répression à la première charte de qualité", "events": [{"date": "1736 – 1751", "titre": "Le « Gin Act » (Sale of Spirits Act)", "texte": "Cette loi du Parlement de Grande-Bretagne est promulguée afin de réduire la consommation de spiritueux, considérée comme l'une des principales causes de la criminalité à Londres. En établissant une taxe de vente au détail et des licences annuelles pour les vendeurs, et en interdisant aux distillateurs de vendre à des marchands sans licence, elle élimine les petits magasins de gin et limite la distribution aux grands distillateurs et détaillants.", "anecdote": ""}, {"date": "1761", "titre": "La Charte de qualité de production du gin", "texte": "Afin de réduire encore les ravages de la consommation de gin, cette charte permet à celui-ci de s'appeler « Distilled London Gin ». Il s'agit d'une appellation garantissant la méthode de production, mais ce n'est pas une A.O. (Appellation d'Origine) : « London Gin » désigne une technique d'élaboration, pas une origine géographique.", "anecdote": ""}, {"date": "1769", "titre": "Naissance des premières grandes Maisons", "texte": "Les premières grandes Maisons apparaissent à la fin du XVIII<sup>e</sup> siècle en même temps que la qualité s'améliore. En 1769, Alexandre Gordon crée sa maison dans le sud de Londres. Le gin devient plus sec et plus aromatique ; il entre dans la catégorie des spiritueux élégants dégustés par les classes aisées dans les « Gin Palaces ».", "anecdote": ""}], "marques": ["Gordon's (1769)"]}, {"siecle": "XIX<sup>e</sup>", "periode": "Âge d'or", "panelTitre": "Les grandes maisons et l'expansion coloniale", "events": [{"date": "1830 / 1838", "titre": "Charles Tanqueray s'installe à Londres", "texte": "Charles Tanqueray s'installe dans le quartier de Bloomsbury à Londres. D'autres Maisons suivront, portées par l'amélioration continue de la qualité du gin.", "anecdote": ""}, {"date": "1863 – 1876", "titre": "Naissance de Beefeater", "texte": "James Burrough achète la distillerie John Taylor and Sons, dans le quartier de Chelsea à Londres, et crée la marque Beefeater, qui sera lancée en 1876.", "anecdote": ""}, {"date": "XIX<sup>e</sup> s.", "titre": "Le gin conquiert les colonies britanniques", "texte": "Au XIX<sup>e</sup> siècle, le gin s'exporte dans toutes les colonies britanniques, nombreuses à l'époque, et se consomme avec du tonic, car la quinine qu'il contient permet de lutter contre la malaria.", "anecdote": "🍸 L'ancêtre direct du Gin Tonic naît d'un usage préventif contre le paludisme."}], "marques": ["Tanqueray (1830/1838)", "Beefeater (1863/1876)"]}, {"siecle": "XX<sup>e</sup>", "periode": "Prohibition & industrie", "panelTitre": "L'Amérique, la réglementation et l'ère industrielle", "events": [{"date": "1920 – 1933", "titre": "Le gin conquiert l'Amérique pendant la Prohibition", "texte": "Le gin conquiert l'Amérique pendant la prohibition, car la qualité du whisky produit clandestinement à cette époque laisse à désirer et oblige les « irréductibles » à importer des alcools étrangers de meilleure qualité.", "anecdote": ""}, {"date": "1920", "titre": "Une loi réglemente l'élaboration du gin", "texte": "C'est en 1920 qu'une loi réglemente l'élaboration du gin, obligeant les fabricants à utiliser de l'alcool pratiquement pur (96 % minimum). L'ère industrielle vient d'être ouverte : tout le talent des fabricants consiste dès lors à choisir les ingrédients qui vont parfumer cet alcool neutre, chacun gardant sa recette jalousement secrète.", "anecdote": ""}, {"date": "1933", "titre": "Fin de la Prohibition", "texte": "Le gin fait son apparition dans tous les clubs clandestins et, en 1933, avec le 21<sup>e</sup> amendement abrogeant la prohibition, il orne déjà tous les bars des États-Unis. Le gin devient l'un des alcools blancs les plus consommés au monde.", "anecdote": ""}, {"date": "Années 1960", "titre": "L'alambic « Carter Head »", "texte": "La société John Dore & Co Ltd invente l'alambic « Carter Head », doté d'une chambre en cuivre à son sommet permettant de charger en arômes les vapeurs d'alcool. Ce type d'alambic, devenu extrêmement rare, est encore utilisé par quelques distillateurs.", "anecdote": ""}]}, {"siecle": "XXI<sup>e</sup>", "periode": "Craft & IGP", "panelTitre": "Le renouveau du gin et la reconnaissance géographique", "events": [{"date": "Aujourd'hui", "titre": "Le New Western Gin, le gin « made in USA »", "texte": "En matière de spiritueux, les Américains aiment cultiver leur différence. Ils donnent naissance aux New Western gins, un nouveau style porté par les nombreuses micro-distilleries américaines, très créatives. Contrairement aux London Gin très marqués par le genièvre, les New Western gins sont plutôt dominés par les arômes des autres botaniques de la recette.", "anecdote": ""}, {"date": "Aujourd'hui", "titre": "19 Indications Géographiques Protégées reconnues par l'UE", "texte": "Les boissons spiritueuses aromatisées aux baies de genévrier peuvent se compléter d'une I.G.P. L'UE en reconnaît 19, dont le Genièvre Flandres Artois (Nord et Pas-de-Calais), le Plymouth Gin (Devon, Royaume-Uni) et le Gin de Mahón (île de Minorque, Espagne).", "anecdote": "🏷️ Plymouth Gin et Gin de Mahón sont les deux I.G.P les plus connues parmi les 19 reconnues par le règlement européen."}], "marques": ["Plymouth Gin (IGP)", "Gin de Mahón (IGP)", "Hendrick's", "Monkey 47", "Citadelle", "The Botanist"]}];

function buildPanels(){
  DATA.forEach((c,i)=>{
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.dataset.idx = i;

    let cardsHtml = c.events.map((ev,j)=>`
      <div class="card" data-cid="${i}-${j}">
        <div class="card-head">
          <span class="card-date">${ev.date}</span>
          <h3>${ev.titre}</h3>
          <span class="card-arrow">▸</span>
        </div>
        <div class="card-details">
          <p>${ev.texte}</p>
          ${ev.anecdote ? `<div class="anecdote">${ev.anecdote}</div>` : ''}
        </div>
      </div>
    `).join('');

    let marquesHtml = c.marques ? `
      <div class="marques-row">
        <div class="marques-label">Repères / marques citées</div>
        <div class="marques-tags">${c.marques.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>` : '';

    panel.innerHTML = `
      <div class="panel-head">
        <span class="panel-siecle">${c.siecle}</span>
        <span class="panel-titre">${c.panelTitre}</span>
      </div>
      ${cardsHtml}
      ${marquesHtml}
    `;
    panelWrap.appendChild(panel);
  });
}

function goTo(i){
  current = i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active', idx===i));
  document.querySelectorAll('.panel').forEach((p,idx)=>p.classList.toggle('active', idx===i));
  btnPrev.disabled = (i===0);
  btnNext.disabled = (i===DATA.length-1);
  btnNext.textContent = (i===DATA.length-1) ? 'Fin de la frise ✓' : 'Siècle suivant ▸';
}

function updateProgress(){
  count.textContent = explored.size;
  fill.style.width = (explored.size/DATA.length*100)+'%';
}

function attachCardEvents(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=>{
      card.classList.toggle('open');
      const idx = parseInt(card.dataset.cid.split('-')[0]);
      explored.add(idx);
      document.querySelectorAll('.tab')[idx].classList.add('done');
      updateProgress();
    });
  });
}

btnPrev.addEventListener('click', ()=>{ if(current>0) goTo(current-1); });
btnNext.addEventListener('click', ()=>{ if(current<DATA.length-1) goTo(current+1); });

buildNav();
buildPanels();
attachCardEvents();
goTo(0);
updateProgress();
</script>
</body>
</html>
