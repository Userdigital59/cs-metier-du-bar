<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Les grandes figures du Whisky — CS Métiers du Bar</title>
<style>
  :root{
    --noir:#14110F;
    --or:#C9A227;
    --or-clair:#E3C766;
    --blanc:#FFFFFF;
    --rouge-err:#8B2E2E;
    --vert-ok:#3E6B4F;
    --vh:1vh;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    overflow:hidden;
    background:var(--noir);
    font-family:Arial, Helvetica, sans-serif;
    color:var(--blanc);
  }
  body{
    position:relative;
    height:calc(var(--vh, 1vh) * 100);
    display:flex; flex-direction:column;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(201,162,39,0.12), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,162,39,0.10), transparent 45%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 4px);
    pointer-events:none;
    z-index:0;
  }

  /* ---- Lien d'évitement (accessibilité clavier) ---- */
  .skip-link{
    position:absolute; top:-60px; left:12px; z-index:100;
    background:var(--or); color:var(--noir); font-weight:bold;
    padding:10px 16px; border-radius:6px; text-decoration:none;
    transition:top .2s ease;
  }
  .skip-link:focus{ top:12px; }

  /* ---- Barre de progression ---- */
  .progress-wrap{
    position:relative; z-index:5;
    width:100%; height:6px;
    background:rgba(255,255,255,0.08);
    flex-shrink:0;
  }
  .progress-bar{
    height:100%; width:10%;
    background:linear-gradient(90deg, var(--or), var(--or-clair));
    box-shadow:0 0 8px rgba(201,162,39,0.6);
    transition:width .35s ease;
  }
  .progress-label{
    position:absolute; top:10px; right:24px;
    font-size:12px; letter-spacing:.06em;
    color:var(--or-clair);
    z-index:6; text-transform:uppercase;
  }
  .sr-only{
    position:absolute; width:1px; height:1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
  }

  /* ---- Header ---- */
  header{
    position:relative; z-index:5;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 32px 0 32px;
    flex-shrink:0;
  }
  .logo{ display:flex; align-items:center; gap:10px; }
  .logo img{
    width:40px; height:40px; object-fit:contain;
    filter:drop-shadow(0 0 6px rgba(201,162,39,0.35));
  }
  .logo-text{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--or-clair); line-height:1.3;
    border-left:2px solid var(--or); padding-left:10px;
  }
  .badge-learner{
    font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--noir); background:var(--or);
    padding:5px 12px; border-radius:20px; font-weight:bold;
  }

  /* ---- Zone écrans ---- */
  #stage{
    position:relative; z-index:4;
    flex:1;
    min-height:0;
    display:flex;
  }
  .screen{
    display:none;
    flex-direction:column; align-items:center; justify-content:center;
    width:100%; height:100%;
    text-align:center;
    padding:8px 28px;
    outline:none;
  }
  .screen.active{ display:flex; }
  @media (prefers-reduced-motion:no-preference){
    .screen.active{ animation:fadeIn .35s ease; }
  }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  /* --- Écran intro / outro --- */
  .eyebrow{
    font-size:12px; letter-spacing:.25em; text-transform:uppercase;
    color:var(--or); margin-bottom:12px;
  }
  h1{
    font-size:clamp(24px,4vw,44px);
    line-height:1.12; font-weight:800; color:var(--blanc);
    max-width:820px; margin-bottom:14px;
  }
  h1 span{ color:var(--or-clair); }
  .intro-text{
    font-size:15px; line-height:1.55;
    color:rgba(255,255,255,0.88);
    max-width:620px; margin-bottom:22px;
  }

  /* --- Écran personnage --- */
  .bio-layout{
    display:flex; align-items:center; justify-content:center; gap:34px;
    max-width:920px; width:100%;
    height:100%;
  }
  .portrait-wrap{
    flex-shrink:0;
    width:190px; height:230px;
    border-radius:10px;
    overflow:hidden;
    border:2px solid var(--or);
    box-shadow:0 0 0 5px rgba(201,162,39,0.12), 0 10px 30px rgba(0,0,0,0.5);
    background:#1c1813;
    display:flex; align-items:center; justify-content:center;
  }
  .portrait-wrap img{
    width:100%; height:100%; object-fit:cover;
    filter:grayscale(20%) contrast(1.05);
  }
  .monogram{
    font-size:64px; font-weight:800; color:var(--or);
    font-family:Georgia, 'Times New Roman', serif;
  }
  .bio-text{
    text-align:left;
    max-width:520px;
    max-height:100%;
    overflow-y:auto;
    padding-right:6px;
  }
  .bio-era{
    display:inline-block;
    font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--noir); background:var(--or-clair);
    padding:4px 10px; border-radius:4px; font-weight:bold;
    margin-bottom:10px;
  }
  .bio-name{
    font-size:clamp(20px,2.6vw,30px);
    font-weight:800; color:var(--blanc); margin-bottom:2px;
  }
  .bio-tag{
    font-size:13px; color:var(--or-clair);
    margin-bottom:12px; font-style:italic;
  }
  .bio-body{
    font-size:14.5px; line-height:1.58;
    color:rgba(255,255,255,0.88);
  }

  /* --- Écran outro / récap --- */
  .recap-grid{
    display:grid;
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap:10px;
    max-width:760px;
    margin:0 auto 24px auto;
  }
  .recap-item{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    font-size:11px; color:rgba(255,255,255,0.75);
  }
  .recap-item .thumb{
    width:56px; height:56px; border-radius:50%;
    overflow:hidden; border:2px solid var(--or);
    background:#1c1813; display:flex; align-items:center; justify-content:center;
  }
  .recap-item .thumb img{ width:100%; height:100%; object-fit:cover; }
  .recap-item .thumb .monogram{ font-size:22px; }

  /* ---- Boutons ---- */
  .btn{
    position:relative;
    display:inline-flex; align-items:center; gap:10px;
    background:var(--or); color:var(--noir); font-weight:bold;
    font-size:14px; letter-spacing:.04em; text-transform:uppercase;
    border:none; border-radius:8px; padding:13px 28px;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    box-shadow:0 4px 14px rgba(201,162,39,0.25);
  }
  .btn:hover{ transform:translateY(-2px); background:var(--or-clair); box-shadow:0 8px 22px rgba(201,162,39,0.45); }
  .btn:active{ transform:translateY(0); }
  .btn:focus-visible, .navbtn:focus-visible, .dot:focus-visible{
    outline:3px solid var(--or-clair); outline-offset:2px;
  }
  .btn svg{ width:15px; height:15px; transition:transform .18s ease; }
  .btn:hover svg{ transform:translateX(3px); }
  .btn.locked{ background:var(--vert-ok); color:var(--blanc); cursor:default; box-shadow:none; }
  .btn.locked:hover{ transform:none; }
  .btn.ghost{
    background:transparent; color:var(--or-clair);
    border:1.5px solid var(--or); box-shadow:none;
  }
  .btn.ghost:hover{ background:rgba(201,162,39,0.12); transform:translateY(-2px); }

  /* ---- Navigation basse (persistante) ---- */
  nav.pager{
    position:relative; z-index:5;
    display:flex; align-items:center; justify-content:center; gap:18px;
    padding:10px 20px 14px 20px;
    flex-shrink:0;
  }
  .navbtn{
    background:transparent; border:1.5px solid rgba(201,162,39,0.5);
    color:var(--or-clair); width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .18s ease; flex-shrink:0;
  }
  .navbtn:hover:not(:disabled){ background:rgba(201,162,39,0.15); border-color:var(--or); }
  .navbtn:disabled{ opacity:0.25; cursor:default; }
  .navbtn svg{ width:16px; height:16px; }

  .dots{ display:flex; gap:7px; flex-wrap:wrap; justify-content:center; max-width:340px; }
  .dot{
    width:9px; height:9px; border-radius:50%;
    background:rgba(255,255,255,0.25); border:none; cursor:pointer;
    padding:0; transition:all .2s ease; flex-shrink:0;
  }
  .dot[aria-current="true"]{ background:var(--or); width:22px; border-radius:5px; }
  .dot:hover{ background:var(--or-clair); }

  footer.credit{
    position:relative; z-index:5;
    text-align:center; font-size:10.5px; letter-spacing:.05em;
    color:rgba(255,255,255,0.32); padding-bottom:8px; flex-shrink:0;
  }

  /* ---- Décor flottant portraits (intro/outro uniquement) ---- */
  .deco{
    position:fixed; z-index:1; border-radius:8px; object-fit:cover;
    opacity:0.10; filter:grayscale(100%) contrast(1.05);
    pointer-events:none; border:1px solid rgba(201,162,39,0.25);
    display:none;
  }
  .deco.show{ display:block; }
  .d1{ top:8%;  left:4%;  width:110px; height:138px; transform:rotate(-6deg); }
  .d2{ top:64%; left:5%;  width:92px;  height:120px; transform:rotate(5deg); }
  .d3{ top:12%; right:5%; width:100px; height:132px; transform:rotate(7deg); }
  .d4{ top:62%; right:4%; width:110px; height:138px; transform:rotate(-5deg); }

  /* ---- Responsive : mobile & tablette ---- */
  @media (max-width:900px){
    .deco{ display:none !important; }
    header{ padding:10px 16px 0 16px; }
    .logo-text{ display:none; }
    .bio-layout{ flex-direction:column; gap:14px; }
    .portrait-wrap{ width:120px; height:150px; }
    .bio-text{ text-align:center; max-width:100%; }
    .bio-tag{ margin-bottom:8px; }
    .recap-grid{ grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    h1{ font-size:clamp(20px,6vw,30px); }
    .intro-text{ font-size:13.5px; }
    .screen{ padding:6px 16px; }
  }
  @media (min-width:901px) and (max-width:1200px){
    .bio-layout{ gap:24px; }
  }
  @media (max-width:420px){
    .recap-grid{ grid-template-columns:repeat(3,minmax(0,1fr)); }
    .badge-learner{ display:none; }
  }
  @media (max-height:480px) and (orientation:landscape){
    .portrait-wrap{ width:110px; height:110px; }
    .bio-body{ font-size:12.5px; }
    h1{ font-size:22px; margin-bottom:8px; }
    .intro-text{ font-size:12.5px; margin-bottom:14px; }
  }
</style>
</head>

/* ---------- Construction des écrans ---------- */
const stage = document.getElementById('stage');

function screenHTML_intro(){
  return `
    <div class="eyebrow">Module Culture du bar — Les spiritueux</div>
    <h1 tabindex="-1">Les grandes figures <span>du Whisky</span></h1>
    <p class="intro-text">
      Derrière chaque grand whisky se cache une histoire d'hommes : distillateurs, inventeurs,
      négociants. Découvrez les 8 personnages qui ont façonné le whisky tel qu'on le connaît
      aujourd'hui, de l'alambic à colonne aux blends modernes.
    </p>
    <button class="btn" id="startBtn">
      Commencer
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  `;
}

function screenHTML_personnage(p){
  const portrait = p.img
    ? `<img src="data:image/jpeg;base64,${window[p.img]}" alt="Portrait de ${p.name}, ${p.tag}">`
    : `<span class="monogram" aria-hidden="true">${p.name.charAt(0)}</span>`;
  return `
    <div class="bio-layout">
      <div class="portrait-wrap">${portrait}</div>
      <div class="bio-text">
        <span class="bio-era">${p.era}</span>
        <h2 class="bio-name" tabindex="-1">${p.name}</h2>
        <p class="bio-tag">${p.tag}</p>
        <p class="bio-body">${p.bio}</p>
      </div>
    </div>
  `;
}

function screenHTML_outro(){
  const items = PERSONNAGES.map(p=>{
    const thumb = p.img
      ? `<img src="data:image/jpeg;base64,${window[p.img]}" alt="">`
      : `<span class="monogram" aria-hidden="true">${p.name.charAt(0)}</span>`;
    return `<div class="recap-item"><div class="thumb">${thumb}</div><span>${p.name}</span></div>`;
  }).join('');
  return `
    <div class="eyebrow">Récapitulatif</div>
    <h1 tabindex="-1">8 figures, <span>une seule histoire</span></h1>
    <div class="recap-grid">${items}</div>
    <button class="btn locked" id="endBtn" disabled>
      Module terminé ✓
    </button>
  `;
}

const screens = [];
screens.push({key:'intro', title:'Introduction', html:screenHTML_intro()});
PERSONNAGES.forEach(p => screens.push({key:p.id, title:p.name, html:screenHTML_personnage(p)}));
screens.push({key:'outro', title:'Récapitulatif', html:screenHTML_outro()});

screens.forEach((s, i)=>{
  const div = document.createElement('section');
  div.className = 'screen';
  div.id = 'screen-' + i;
  div.setAttribute('role','group');
  div.setAttribute('aria-roledescription','écran');
  div.setAttribute('aria-label', s.title);
  div.innerHTML = s.html;
  stage.appendChild(div);
});

const TOTAL = screens.length;
let current = 0;

/* ---------- Pastilles de navigation ---------- */
const dotsWrap = document.getElementById('dots');
screens.forEach((s,i)=>{
  const b = document.createElement('button');
  b.className = 'dot';
  b.setAttribute('role','tab');
  b.setAttribute('aria-label', (i+1) + '. ' + s.title);
  b.addEventListener('click', ()=> goTo(i));
  dotsWrap.appendChild(b);
});
const dotButtons = Array.from(dotsWrap.children);

const progressBar = document.getElementById('progressBar');
const progressWrap = document.getElementById('progressWrap');
const progressLabel = document.getElementById('progressLabel');
const liveRegion = document.getElementById('liveRegion');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function render(){
  screens.forEach((s,i)=>{
    document.getElementById('screen-'+i).classList.toggle('active', i===current);
  });
  dotButtons.forEach((d,i)=> d.setAttribute('aria-current', i===current ? 'true':'false'));

  const pct = Math.round(((current+1)/TOTAL)*100);
  progressBar.style.width = pct + '%';
  progressWrap.setAttribute('aria-valuenow', pct);
  progressLabel.textContent = 'Étape ' + (current+1) + ' / ' + TOTAL;
  liveRegion.textContent = 'Écran ' + (current+1) + ' sur ' + TOTAL + ' : ' + screens[current].title;

  prevBtn.disabled = (current === 0);
  nextBtn.disabled = false;

  // gestion des décors flottants uniquement sur intro/outro
  document.querySelectorAll('.deco').forEach(d=>{
    d.classList.toggle('show', current===0 || current===TOTAL-1);
  });

  // focus accessible sur le titre de l'écran actif
  const activeScreen = document.getElementById('screen-'+current);
  const heading = activeScreen.querySelector('h1, h2');
  if(heading){ heading.setAttribute('tabindex','-1'); heading.focus({preventScroll:true}); }

  // reliaison des boutons internes (start / end) après re-render
  const startBtn = document.getElementById('startBtn');
  if(startBtn) startBtn.addEventListener('click', ()=> goTo(current+1));
}

function goTo(i){
  if(i<0 || i>=TOTAL) return;
  current = i;
  render();
}

prevBtn.addEventListener('click', ()=> goTo(current-1));
nextBtn.addEventListener('click', ()=> goTo(current+1));

/* ---------- Clavier ---------- */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight'){ goTo(current+1); }
  else if(e.key === 'ArrowLeft'){ goTo(current-1); }
  else if(e.key === 'Home'){ goTo(0); }
  else if(e.key === 'End'){ goTo(TOTAL-1); }
});

/* ---------- Swipe tactile (smartphone / tablette) ---------- */
let touchStartX = null;
stage.addEventListener('touchstart', (e)=>{ touchStartX = e.changedTouches[0].clientX; }, {passive:true});
stage.addEventListener('touchend', (e)=>{
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 45){ dx < 0 ? goTo(current+1) : goTo(current-1); }
  touchStartX = null;
}, {passive:true});

/* ---------- Hauteur de viewport réelle (barres mobiles iOS/Android) ---------- */
function setVH(){
  document.documentElement.style.setProperty('--vh', (window.innerHeight*0.01)+'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', setVH);

render();

/* Intégration Storyline (à câbler une fois le module en Web Object) :
   window.parent.GetPlayer().SetVar("module_whisky_termine", true) au dernier écran. */
</script>

</body>
</html>
