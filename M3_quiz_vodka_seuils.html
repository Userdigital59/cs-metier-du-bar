<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITRE_QUIZ__</title>
<style>
  :root{
    --rouge-cma:#C9A227;
    --or-clair:#E3C766;
    --noir:#14110F;
    --gris:#B9B2A0;
    --fond:#1B1712;
    --fond-alt:#221D17;
    --succes:#3E6B4F;
    --erreur:#8B2E2E;
    --blanc:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--noir);
    color:var(--blanc);
    display:flex;
    justify-content:center;
    padding:16px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(201,162,39,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,162,39,0.08), transparent 45%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 4px);
    pointer-events:none;
    z-index:0;
  }
  .deco{
    position:fixed;
    opacity:.11;
    pointer-events:none;
    z-index:0;
    width:150px;
  }
  .deco.shaker-tl{top:-20px;left:-30px;transform:rotate(-15deg);}
  .deco.femme-br{bottom:-15px;right:-25px;width:130px;}
  @media (max-width:760px){ .deco{display:none;} }
  .quiz-app{
    width:100%;
    max-width:680px;
    background:var(--fond);
    border:1px solid rgba(201,162,39,.35);
    border-radius:12px;
    box-shadow:0 4px 24px rgba(0,0,0,.4);
    padding:28px 28px 32px;
    position:relative;
    z-index:1;
  }
  .logo-bar{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
  }
  .logo-bar img{
    width:64px;
    height:auto;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
  }
  .footer-mention{
    text-align:center;
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid rgba(201,162,39,.25);
    font-size:.75rem;
    letter-spacing:.03em;
    color:var(--gris);
  }
  h1,h2,.titre-question{
    font-family:Arial,sans-serif;
    color:var(--rouge-cma);
  }
  h1{font-size:1.4rem;margin-top:0;margin-bottom:16px;}
  .titre-question{font-size:1.2rem;margin-bottom:24px;line-height:1.4;}
  .narratif{
    background:var(--fond-alt);
    border-left:4px solid var(--rouge-cma);
    padding:14px 18px;
    margin-bottom:24px;
    font-size:.95rem;
    line-height:1.6;
    border-radius:4px;
    color:var(--blanc);
  }
  .btn{
    font-family:Arial,sans-serif;
    border:2px solid var(--rouge-cma);
    background:transparent;
    color:var(--or-clair);
    border-radius:8px;
    padding:12px 18px;
    min-height:44px;
    font-size:1rem;
    cursor:pointer;
    transition:.15s;
  }
  .btn:hover{background:rgba(201,162,39,.12);transform:translateY(-1px);}
  .btn.actif{background:var(--rouge-cma);color:var(--noir);}
  .btn.correct{background:var(--succes);border-color:var(--succes);color:#fff;}
  .btn.incorrect{background:var(--erreur);border-color:var(--erreur);color:#fff;}
  .btn-primary{
    background:var(--rouge-cma);color:var(--noir);width:100%;font-weight:700;
    font-size:1.05rem;padding:14px 18px;border-color:var(--rouge-cma);
  }
  .btn-primary:hover{background:var(--or-clair);transform:translateY(-2px);box-shadow:0 0 14px rgba(201,162,39,.4);}
  .btn-primary:disabled{
    background:var(--gris);border-color:var(--gris);cursor:not-allowed;opacity:.5;transform:none;box-shadow:none;
  }
  .zone-interaction{margin-bottom:28px;}
  .footer-action{
    border-top:1px solid #EAE7E2;
    padding-top:20px;
    margin-top:8px;
  }
  .choix-liste{display:flex;flex-direction:column;gap:10px;}
  .choix-liste .btn{text-align:left;}
  .vf-row{display:flex;gap:12px;}
  .vf-row .btn{flex:1;min-height:56px;font-weight:600;}
  .trous-texte{font-size:1.05rem;line-height:2.2;color:var(--blanc);}
  .trous-texte input{
    border:none;border-bottom:2px solid var(--rouge-cma);
    font-family:inherit;font-size:1rem;width:120px;
    padding:2px 4px;text-align:center;background:var(--fond-alt);color:var(--blanc);
  }
  .assoc-cols{display:flex;gap:16px;}
  .assoc-col{flex:1;display:flex;flex-direction:column;gap:8px;}
  .assoc-item.lie{background:var(--succes);color:#fff;border-color:var(--succes);}
  .ordre-liste{display:flex;flex-direction:column;gap:8px;}
  .ordre-ligne{
    display:flex;align-items:center;gap:8px;
    background:var(--fond-alt);border-radius:8px;padding:8px 12px;
  }
  .ordre-ligne span{flex:1;}
  .ordre-btns{display:flex;flex-direction:column;gap:2px;}
  .ordre-btns button{
    border:none;background:var(--rouge-cma);color:#fff;border-radius:4px;
    width:28px;height:24px;cursor:pointer;font-size:.8rem;
  }
  .hotspot-wrap{position:relative;display:inline-block;max-width:100%;}
  .hotspot-wrap img{max-width:100%;display:block;border-radius:8px;}
  .hotspot-zone{
    position:absolute;border-radius:50%;
    border:2px dashed var(--rouge-cma);
    transform:translate(-50%,-50%);
    cursor:pointer;background:rgba(168,19,29,.08);
  }
  .qo-input{
    width:100%;min-height:80px;font-family:inherit;font-size:1rem;
    border:2px solid var(--gris);border-radius:8px;padding:10px;
  }
  .curseur-wrap{padding:10px 0;}
  .curseur-val{
    text-align:center;font-size:1.6rem;font-weight:700;color:var(--rouge-cma);margin-bottom:8px;
  }
  input[type="range"]{width:100%;accent-color:var(--rouge-cma);}

  .chrono-badge{
    display:inline-block;background:var(--rouge-cma);color:#fff;
    font-size:.85rem;font-weight:700;padding:3px 10px;border-radius:12px;
    vertical-align:middle;margin-left:8px;
  }

  .qcm-img-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;
  }
  .qcm-img-item{
    border:2px solid var(--rouge-cma);background:var(--fond);border-radius:10px;
    padding:8px;cursor:pointer;text-align:center;transition:.15s;
  }
  .qcm-img-item img{width:100%;border-radius:6px;display:block;margin-bottom:8px;aspect-ratio:1;object-fit:cover;}
  .qcm-img-item span{font-size:.9rem;color:var(--noir);}
  .qcm-img-item:hover{background:#fdecec;}
  .qcm-img-item.actif{background:var(--rouge-cma);}
  .qcm-img-item.actif span{color:#fff;}

  .classement-items{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
  .classement-item small{opacity:.8;font-size:.8rem;}
  .classement-categories{display:flex;flex-wrap:wrap;gap:10px;}
  .classement-cat{background:var(--fond-alt);}

  .assoc-select-liste{display:flex;flex-direction:column;gap:14px;}
  .assoc-select-ligne{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--blanc);}
  .assoc-select-ligne select{
    font-family:inherit;font-size:1rem;padding:8px 10px;border:2px solid var(--rouge-cma);
    border-radius:8px;background:var(--fond-alt);color:var(--blanc);min-width:160px;
  }

  .rafale-carte{text-align:center;padding:10px 0;color:var(--blanc);}
  .rafale-carte p{font-size:1.15rem;margin:16px 0;font-weight:600;}
  .rafale-fin{
    text-align:center;font-size:1.05rem;color:var(--rouge-cma);font-weight:600;padding:20px 0;
  }

  .feedback{
    margin-top:18px;padding:14px 16px;border-radius:8px;font-size:.95rem;line-height:1.5;
  }
  .feedback.ok{background:rgba(62,107,79,.18);color:#8fd6a8;border:1px solid var(--succes);}
  .feedback.ko{background:rgba(139,46,46,.18);color:#e39a9a;border:1px solid var(--erreur);}
  .progress{
    height:6px;background:var(--fond-alt);border-radius:3px;margin-bottom:28px;overflow:hidden;
  }
  .progress-bar{height:100%;background:var(--rouge-cma);transition:.3s;}
  .resultat{text-align:center;color:var(--blanc);}
  .resultat .score-final{
    font-family:Arial,sans-serif;font-size:3rem;color:var(--rouge-cma);margin:10px 0;font-weight:700;
  }
  .hidden{display:none;}
</style>
</head>

<script>
/* ============================================================
   DONNÉES DU QUIZ — à remplir par Claude lors de la génération
   ============================================================ */
const TITRE = "Le Piège des Seuils — La Vodka";
const NARRATIF_INTRO = "Contrôle qualité en salle : un client conteste l'étiquette d'une bouteille de vodka. Avant de trancher, tu dois maîtriser les seuils réglementaires par cœur. Un chiffre faux et tu induis le client en erreur !";
const NARRATIF_CONCLUSION_REUSSITE = "Contrôle validé. Tu maîtrises les seuils clés de la vodka : de quoi rassurer n'importe quel client pointilleux sur l'étiquette.";
const NARRATIF_CONCLUSION_ECHEC = "Quelques seuils te jouent encore des tours. Retourne consulter la fiche vodka (TAV, méthanol, sucre) avant ton prochain service.";
const SEUIL_REUSSITE = 60; // % — seuil narratif réussite/échec

// IMPORTANT: nom de variable "questions" imposé (contrat scorm-packager)
const questions = [
  {
    type:"qcm",
    question:"Quel est le T.A.V. (Titre Alcoométrique Volumique) minimal légal de la vodka commercialisée dans l'UE ?",
    choices:["30 %","37,5 %","40 %","45 %"],
    correct:[1],
    multiple:false,
    feedback_ok:"Exact. 37,5 % est le minimum légal — la vodka se situe le plus souvent entre 40 et 45 %.",
    feedback_ko:"Non. Le minimum légal européen est 37,5 %, même si la plupart des vodkas titrent 40-45 %."
  },
  {
    type:"rafale_vf",
    question:"Rafale chronométrée — Vrai ou Faux ? Réponds vite, 10 secondes par carte.",
    temps_par_carte:10,
    cartes:[
      { texte:"L'alcool éthylique d'origine agricole utilisé doit titrer au moins 96 % avant réduction.", correct:true },
      { texte:"La vodka peut légalement être colorée.", correct:false },
      { texte:"La teneur en méthanol ne doit pas dépasser 10 g par hectolitre d'alcool à 100 % vol.", correct:true },
      { texte:"Une vodka aromatisée peut être vendue en dessous de 37,5 %.", correct:false },
      { texte:"La vodka nature peut contenir jusqu'à 8 g/l d'édulcorant.", correct:true }
    ],
    feedback_ok:"Série réussie : les seuils sont bien ancrés.",
    feedback_ko:"Quelques cartes t'ont piégé — retiens bien les valeurs exactes du texte réglementaire."
  },
  {
    type:"texte_trous",
    question:"Complète la mention d'étiquetage obligatoire.",
    texte:"Une vodka non produite exclusivement à partir de {0} ou de {1} doit porter la mention « produit à partir de… ».",
    reponses:["pommes de terre","céréales"],
    tolerance:{accents:false},
    feedback_ok:"Exact : ce sont les deux seules matières premières qui dispensent de cette mention.",
    feedback_ko:"Réponse attendue : pommes de terre et céréales — les deux seules matières qui dispensent de la mention « produit à partir de… »."
  },
  {
    type:"glisser_deposer",
    question:"Associe chaque chiffre à ce qu'il désigne.",
    mode:"select",
    gauche:["37,5 %","96 %","10 g/hl","8 g/l"],
    droite:[
      "TAV minimal du produit fini",
      "TAV minimal de l'alcool avant réduction",
      "Teneur max en méthanol",
      "Sucre max pour une vodka nature"
    ],
    associations:[0,1,2,3],
    feedback_ok:"Tous les seuils sont à leur place.",
    feedback_ko:"Attention à ne pas confondre le seuil de l'alcool brut (96 %) et celui du produit fini (37,5 %)."
  },
  {
    type:"vrai_faux",
    question:"La vodka peut vieillir plusieurs décennies en fût, comme un cognac hors d'âge.",
    correct:false,
    feedback_ok:"Exact, faux : la vodka ne vieillit quasiment jamais (rares exceptions jusqu'à 7 ans).",
    feedback_ko:"Faux : à quelques rares exceptions près (jusqu'à 7 ans), la vodka n'est pas vieillie."
  },
  {
    type:"qcm",
    question:"Une vodka aromatisée édulcorée : quelle est la limite de sucre autorisée ?",
    choices:["8 g/l","50 g/l","100 g/l","Aucune limite"],
    correct:[2],
    multiple:false,
    feedback_ok:"Exact : 100 g/l pour l'aromatisée, contre 8 g/l pour la vodka nature.",
    feedback_ko:"Non, la limite pour une vodka aromatisée édulcorée est de 100 g/l (8 g/l pour la vodka nature)."
  }
];

/* ============================================================
   MOTEUR — ne pas renommer score / questions / showResult
   ============================================================ */
let indexCourant = 0;
let reponsesScore = []; // 0..1 par question
let etatTrousNormalize = s => {
  s = s.toLowerCase().trim();
  s = s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return s;
};

function demarrerQuiz(){
  document.getElementById("ecranQuestion").innerHTML =
    `<h1>${TITRE}</h1><div class="narratif">${NARRATIF_INTRO}</div>
     <button class="btn btn-primary" id="btnDemarrer">Commencer</button>`;
  document.getElementById("btnDemarrer").onclick = () => afficherQuestion(0);
}

function majProgress(){
  const pct = Math.round((indexCourant / questions.length) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
}

function afficherQuestion(i){
  indexCourant = i;
  majProgress();
  const q = questions[i];
  const zone = document.getElementById("ecranQuestion");
  zone.innerHTML = `<div class="titre-question">${q.question} ${q.temps_limite ? `<span class="chrono-badge" id="chronoBadge">${q.temps_limite}s</span>` : ""}</div>
    <div class="zone-interaction" id="zoneInteraction"></div>
    <div class="footer-action">
      <button class="btn btn-primary" id="btnValider">Valider</button>
      <div id="zoneFeedback"></div>
    </div>`;
  const inter = document.getElementById("zoneInteraction");

  const renderers = {
    qcm: renderQCM,
    vrai_faux: renderVraiFaux,
    texte_trous: renderTexteTrous,
    glisser_deposer: renderGlisserDeposer,
    remise_ordre: renderRemiseOrdre,
    hotspot: renderHotspot,
    question_ouverte: renderQuestionOuverte,
    curseur: renderCurseur,
    qcm_image: renderQCMImage,
    classement_categories: renderClassementCategories,
    rafale_vf: renderRafaleVF
  };
  const getScore = renderers[q.type](inter, q);

  let chronoInterval = null;
  let tempsEcoule = false;
  if (q.temps_limite){
    let restant = q.temps_limite;
    chronoInterval = setInterval(() => {
      restant--;
      const badge = document.getElementById("chronoBadge");
      if (badge) badge.textContent = restant + "s";
      if (restant <= 0){
        clearInterval(chronoInterval);
        tempsEcoule = true;
        document.getElementById("btnValider").click();
      }
    }, 1000);
  }

  document.getElementById("btnValider").onclick = () => {
    if (chronoInterval) clearInterval(chronoInterval);
    const s = tempsEcoule ? 0 : getScore(); // temps écoulé = faux automatiquement
    reponsesScore[i] = s;
    afficherFeedback(s, q);
    document.getElementById("btnValider").disabled = true;
    setTimeout(() => {
      if (i + 1 < questions.length) afficherQuestion(i + 1);
      else showResult();
    }, 1600);
  };
}

function afficherFeedback(s, q){
  const ok = s >= 0.999;
  const fb = document.getElementById("zoneFeedback");
  fb.innerHTML = `<div class="feedback ${ok ? "ok" : "ko"}">${ok ? (q.feedback_ok || "Bonne réponse !") : (q.feedback_ko || "Pas tout à fait.")}</div>`;
}

/* ---------- Renderer 1 : QCM ---------- */
function renderQCM(zone, q){
  let selection = new Set();
  zone.innerHTML = `<div class="choix-liste">${q.choices.map((c,idx) =>
    `<button class="btn" data-idx="${idx}">${c}</button>`).join("")}</div>`;
  zone.querySelectorAll(".btn").forEach(btn => {
    btn.onclick = () => {
      const idx = +btn.dataset.idx;
      if (!q.multiple){
        zone.querySelectorAll(".btn").forEach(b => b.classList.remove("actif"));
        selection = new Set([idx]);
        btn.classList.add("actif");
      } else {
        if (selection.has(idx)){ selection.delete(idx); btn.classList.remove("actif"); }
        else { selection.add(idx); btn.classList.add("actif"); }
      }
    };
  });
  return () => {
    const sel = [...selection].sort().join(",");
    const correct = [...q.correct].sort().join(",");
    return sel === correct ? 1 : 0;
  };
}

/* ---------- Renderer 2 : Vrai/Faux ---------- */
function renderVraiFaux(zone, q){
  let reponse = null;
  zone.innerHTML = `<div class="vf-row">
    <button class="btn" data-val="true">Vrai</button>
    <button class="btn" data-val="false">Faux</button>
  </div>`;
  zone.querySelectorAll(".btn").forEach(btn => {
    btn.onclick = () => {
      zone.querySelectorAll(".btn").forEach(b => b.classList.remove("actif"));
      btn.classList.add("actif");
      reponse = btn.dataset.val === "true";
    };
  });
  return () => reponse === q.correct ? 1 : 0;
}

/* ---------- Renderer 3 : Texte à trous ---------- */
function renderTexteTrous(zone, q){
  let html = q.texte.replace(/\{(\d+)\}/g, (m, n) =>
    `<input type="text" data-n="${n}" size="10">`);
  zone.innerHTML = `<div class="trous-texte">${html}</div>`;
  return () => {
    const inputs = zone.querySelectorAll("input");
    let bonnes = 0;
    inputs.forEach(inp => {
      const n = +inp.dataset.n;
      const attendu = q.reponses[n];
      let val = inp.value, ref = attendu;
      if (!q.tolerance || q.tolerance.accents === false){ val = etatTrousNormalize(val); ref = etatTrousNormalize(ref); }
      else { val = val.toLowerCase().trim(); ref = ref.toLowerCase().trim(); }
      if (val === ref) bonnes++;
    });
    return inputs.length ? bonnes / inputs.length : 0;
  };
}

/* ---------- Renderer 4bis : Association via <select> (mode accessible/rapide mobile) ---------- */
function renderAssociationSelect(zone, q){
  zone.innerHTML = `<div class="assoc-select-liste">${q.gauche.map((g,i) =>
    `<div class="assoc-select-ligne">
      <span>${g}</span>
      <select data-i="${i}">
        <option value="">— choisir —</option>
        ${q.droite.map((d,j) => `<option value="${j}">${d}</option>`).join("")}
      </select>
    </div>`).join("")}</div>`;
  return () => {
    let bonnes = 0;
    zone.querySelectorAll("select").forEach(sel => {
      const i = +sel.dataset.i;
      if (sel.value !== "" && +sel.value === q.associations[i]) bonnes++;
    });
    return bonnes / q.gauche.length;
  };
}

/* ---------- Renderer 4 : Glisser-déposer (tap-to-select, ou mode:"select" pour un <select> par ligne) ---------- */
function renderGlisserDeposer(zone, q){
  if (q.mode === "select") return renderAssociationSelect(zone, q);
  const paires = {}; // index gauche -> index droite
  let selectionGauche = null;
  function redraw(){
    zone.innerHTML = `<div class="assoc-cols">
      <div class="assoc-col">${q.gauche.map((g,i) =>
        `<button class="btn assoc-item ${paires[i] !== undefined ? "lie" : ""} ${selectionGauche===i?"actif":""}" data-g="${i}">${g}</button>`).join("")}</div>
      <div class="assoc-col">${q.droite.map((d,j) =>
        `<button class="btn assoc-item ${Object.values(paires).includes(j) ? "lie" : ""}" data-d="${j}">${d}</button>`).join("")}</div>
    </div>`;
    zone.querySelectorAll("[data-g]").forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.g;
        if (paires[i] !== undefined){ delete paires[i]; selectionGauche = null; redraw(); return; }
        selectionGauche = i; redraw();
      };
    });
    zone.querySelectorAll("[data-d]").forEach(btn => {
      btn.onclick = () => {
        if (selectionGauche === null) return;
        const j = +btn.dataset.d;
        paires[selectionGauche] = j;
        selectionGauche = null;
        redraw();
      };
    });
  }
  redraw();
  return () => {
    let bonnes = 0;
    q.associations.forEach((attendu, i) => { if (paires[i] === attendu) bonnes++; });
    return bonnes / q.associations.length;
  };
}

/* ---------- Renderer 5 : Remise en ordre (boutons ↑↓) ---------- */
function renderRemiseOrdre(zone, q){
  let ordre = q.etapes_melangees.map((_, i) => i); // indices, ordre courant
  function redraw(){
    zone.innerHTML = `<div class="ordre-liste">${ordre.map((idx, pos) =>
      `<div class="ordre-ligne" data-pos="${pos}">
        <span>${q.etapes_melangees[idx]}</span>
        <div class="ordre-btns">
          <button data-dir="up" data-pos="${pos}">▲</button>
          <button data-dir="down" data-pos="${pos}">▼</button>
        </div>
      </div>`).join("")}</div>`;
    zone.querySelectorAll("button").forEach(btn => {
      btn.onclick = () => {
        const pos = +btn.dataset.pos, dir = btn.dataset.dir;
        const cible = dir === "up" ? pos - 1 : pos + 1;
        if (cible < 0 || cible >= ordre.length) return;
        [ordre[pos], ordre[cible]] = [ordre[cible], ordre[pos]];
        redraw();
      };
    });
  }
  redraw();
  return () => {
    const ok = ordre.every((idx, pos) => idx === q.ordre_correct[pos]);
    return ok ? 1 : 0;
  };
}

/* ---------- Renderer 6 : Hotspot image ---------- */
function renderHotspot(zone, q){
  let zoneClick = null;
  zone.innerHTML = `<div class="hotspot-wrap">
    <img src="${q.image}" alt="">
    ${q.zones.map((z,i) => `<div class="hotspot-zone" data-i="${i}"
      style="left:${z.x}%;top:${z.y}%;width:${z.rayon*2}%;height:${z.rayon*2}%;"></div>`).join("")}
  </div>`;
  zone.querySelectorAll(".hotspot-zone").forEach(el => {
    el.onclick = () => {
      zone.querySelectorAll(".hotspot-zone").forEach(e => e.style.background = "rgba(168,19,29,.08)");
      el.style.background = "rgba(168,19,29,.35)";
      zoneClick = +el.dataset.i;
    };
  });
  return () => zoneClick !== null && q.zones[zoneClick].correct ? 1 : 0;
}

/* ---------- Renderer 7 : Question ouverte ---------- */
function renderQuestionOuverte(zone, q){
  zone.innerHTML = `<textarea class="qo-input" id="qoInput"></textarea>`;
  return () => {
    let val = document.getElementById("qoInput").value;
    if (!q.tolerance || q.tolerance.accents === false) val = etatTrousNormalize(val);
    else val = val.toLowerCase();
    const trouves = (q.mots_cles || []).filter(mc => {
      let ref = (!q.tolerance || q.tolerance.accents === false) ? etatTrousNormalize(mc) : mc.toLowerCase();
      return val.includes(ref);
    });
    return trouves.length >= (q.min_mots_requis || 1) ? 1 : 0;
  };
}

/* ---------- Renderer 8 : Curseur ---------- */
function renderCurseur(zone, q){
  zone.innerHTML = `<div class="curseur-wrap">
    <div class="curseur-val" id="curVal">${q.min}</div>
    <input type="range" id="curRange" min="${q.min}" max="${q.max}" value="${q.min}">
  </div>`;
  const range = document.getElementById("curRange");
  const val = document.getElementById("curVal");
  range.oninput = () => val.textContent = range.value;
  return () => {
    const diff = Math.abs(+range.value - q.valeur_correcte);
    return diff <= (q.marge_tolerance || 0) ? 1 : 0;
  };
}

/* ---------- Renderer 9 : QCM image ---------- */
function renderQCMImage(zone, q){
  let selection = new Set();
  zone.innerHTML = `<div class="qcm-img-grid">${q.choix.map((c,idx) =>
    `<button class="qcm-img-item" data-idx="${idx}">
      <img src="${c.img}" alt="${c.label}">
      <span>${c.label}</span>
    </button>`).join("")}</div>`;
  zone.querySelectorAll(".qcm-img-item").forEach(btn => {
    btn.onclick = () => {
      const idx = +btn.dataset.idx;
      if (!q.multiple){
        zone.querySelectorAll(".qcm-img-item").forEach(b => b.classList.remove("actif"));
        selection = new Set([idx]);
        btn.classList.add("actif");
      } else {
        if (selection.has(idx)){ selection.delete(idx); btn.classList.remove("actif"); }
        else { selection.add(idx); btn.classList.add("actif"); }
      }
    };
  });
  return () => {
    const sel = [...selection].sort().join(",");
    const correct = [...q.correct].sort().join(",");
    return sel === correct ? 1 : 0;
  };
}

/* ---------- Renderer 10 : Classement par catégories (tap-to-assign) ---------- */
function renderClassementCategories(zone, q){
  const assignations = {}; // index item -> index catégorie
  let itemSelectionne = null;
  function redraw(){
    zone.innerHTML = `
      <div class="classement-items">${q.items.map((it,i) =>
        `<button class="btn classement-item ${assignations[i] !== undefined ? "lie" : ""} ${itemSelectionne===i?"actif":""}" data-i="${i}">
          ${it}${assignations[i] !== undefined ? ` <small>(${q.categories[assignations[i]]})</small>` : ""}
        </button>`).join("")}</div>
      <div class="classement-categories">${q.categories.map((cat,j) =>
        `<button class="btn classement-cat" data-j="${j}">${cat}</button>`).join("")}</div>`;
    zone.querySelectorAll("[data-i]").forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.i;
        itemSelectionne = (itemSelectionne === i) ? null : i;
        redraw();
      };
    });
    zone.querySelectorAll("[data-j]").forEach(btn => {
      btn.onclick = () => {
        if (itemSelectionne === null) return;
        assignations[itemSelectionne] = +btn.dataset.j;
        itemSelectionne = null;
        redraw();
      };
    });
  }
  redraw();
  return () => {
    let bonnes = 0;
    q.reponses.forEach((attendu, i) => { if (assignations[i] === attendu) bonnes++; });
    return bonnes / q.reponses.length;
  };
}

/* ---------- Renderer 11 : Rafale Vrai/Faux (cartes chronométrées en série) ---------- */
function renderRafaleVF(zone, q){
  let indexCarte = 0;
  const resultats = [];
  const btnValider = document.getElementById("btnValider");
  btnValider.classList.add("hidden"); // se valide en interne, pas via le bouton global
  function afficherCarte(){
    if (indexCarte >= q.cartes.length){
      zone.innerHTML = `<div class="rafale-fin">Série terminée : ${resultats.filter(Boolean).length}/${q.cartes.length} bonnes réponses.</div>`;
      btnValider.classList.remove("hidden");
      btnValider.click(); // déclenche le passage à la question suivante
      return;
    }
    const carte = q.cartes[indexCarte];
    let restant = q.temps_par_carte || 5;
    zone.innerHTML = `
      <div class="rafale-carte">
        <span class="chrono-badge">${restant}s</span>
        <p>${carte.texte}</p>
        <div class="vf-row">
          <button class="btn" data-val="true">Vrai</button>
          <button class="btn" data-val="false">Faux</button>
        </div>
      </div>`;
    const interval = setInterval(() => {
      restant--;
      const badge = zone.querySelector(".chrono-badge");
      if (badge) badge.textContent = restant + "s";
      if (restant <= 0){
        clearInterval(interval);
        resultats[indexCarte] = false; // pas de réponse à temps = faux
        indexCarte++;
        afficherCarte();
      }
    }, 1000);
    zone.querySelectorAll("[data-val]").forEach(btn => {
      btn.onclick = () => {
        clearInterval(interval);
        const rep = btn.dataset.val === "true";
        resultats[indexCarte] = (rep === carte.correct);
        indexCarte++;
        afficherCarte();
      };
    });
  }
  afficherCarte();
  return () => resultats.length ? resultats.filter(Boolean).length / q.cartes.length : 0;
}

/* ---------- Résultat final (contrat scorm-packager) ---------- */
function showResult(){
  // score = variable finale 0-100, total = questions.length (NE PAS RENOMMER)
  const score = Math.round(
    reponsesScore.reduce((sum, s, i) => sum + s * (questions[i].points || 1), 0) /
    questions.reduce((sum, q) => sum + (q.points || 1), 0) * 100
  );
  const reussite = score >= SEUIL_REUSSITE;
  document.getElementById("ecranQuestion").classList.add("hidden");
  document.getElementById("progressBar").style.width = "100%";
  const ecran = document.getElementById("ecranResultat");
  ecran.classList.remove("hidden");
  ecran.innerHTML = `
    <h2>${reussite ? "Mission réussie" : "Mission à reprendre"}</h2>
    <div class="score-final">${score}%</div>
    <p>${reussite ? NARRATIF_CONCLUSION_REUSSITE : NARRATIF_CONCLUSION_ECHEC}</p>`;
}
